        function showSecondLevel(unitId) {
            const container = document.getElementById("second-level");
            container.innerHTML = "";

            const people = data[unitId];
            let firstPersonId = null;

            for (let personId in people) {
                if (!firstPersonId) firstPersonId = personId;
                const btn = document.createElement("button");
                btn.innerText = personId + " - " + people[personId].first + " " + people[personId].last;
                btn.onclick = function() { showDetails(unitId, personId); highlightSelected(btn); };
                container.appendChild(btn);
            }

            if (firstPersonId) {
                showDetails(unitId, firstPersonId);
                highlightSelected(container.firstChild);
            } else {
                document.getElementById("details").innerHTML = "No data";
            }
        }

        function showDetails(unitId, personId) {
            const details = data[unitId][personId];
            const container = document.getElementById("details");
            container.innerHTML = "";
            for (const key in details) {
                const line = document.createElement("div");
                line.innerHTML = "<strong>" + key.charAt(0).toUpperCase() + key.slice(1) + ":</strong> " + details[key];
                container.appendChild(line);
            }
        }

        function highlightSelected(selectedBtn) {
            const container = document.getElementById("second-level");
            [...container.children].forEach(btn => {
                btn.style.backgroundColor = btn === selectedBtn ? "#add8e6" : "";
            });
        }

        // New search function
        function performSearch(query) {
            const container = document.getElementById("second-level");
            const detailsDiv = document.getElementById("details");
            container.innerHTML = "";
            detailsDiv.textContent = "";

            if (!query.trim()) {
                // If search box is cleared, reset view
                detailsDiv.textContent = "Select building number or search";
                return;
            }

            query = query.toLowerCase();

            // Search all people in all units
            let foundAny = false;
            for (const unitId in data) {
                const people = data[unitId];
                for (const personId in people) {
                    const person = people[personId];
                    // Combine all searchable fields into one string
                    const searchableText = 
                        `${personId} ${person.first} ${person.last} ${person.rank} ${person.sex} ${person.company} ${person.phone_number} ${person.comments}`.toLowerCase();

                    if (searchableText.includes(query)) {
                        foundAny = true;
                        const btn = document.createElement("button");
                        btn.innerText = `${unitId} / ${personId} - ${person.first} ${person.last}`;
                        btn.onclick = function() { 
                            showDetails(unitId, personId); 
                            highlightSelected(btn);
                        };
                        container.appendChild(btn);
                    }
                }
            }

            if (!foundAny) {
                container.textContent = "No matches found";
            }
        }
